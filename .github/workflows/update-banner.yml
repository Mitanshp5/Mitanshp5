name: Update Spotify banner

on:
  workflow_dispatch:
  schedule:
    - cron: "2-59/5 * * * *"

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install renderer dependencies
        run: python -m pip install --requirement requirements.txt
      - name: Render banner
        env:
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          SPOTIFY_REFRESH_TOKEN: ${{ secrets.SPOTIFY_REFRESH_TOKEN }}
        run: python scripts/generate_banner.py
      - name: Commit changed banner
        run: |
          if git diff --quiet -- assets/banner.svg; then
            echo "No banner changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/banner.svg
          git commit -m "chore: update Spotify banner"
          git push
